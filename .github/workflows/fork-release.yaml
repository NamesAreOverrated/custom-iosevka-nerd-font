name: Fork release

on:
  push:
    branches: [main]
    paths: [private-build-plans.toml]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  # 1. 这里移除了原本大写的 IMAGE 变量
  FONT_NAME: afio

jobs:
  build:
    if: github.repository != 'awnion/custom-iosevka-nerd-font'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # 2. 新增这一步：将用户名和仓库名转为小写，并写入环境变量 IMAGE 中
      - name: Set lowercase image name
        run: |
          echo "IMAGE=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }} # 这里会自动读取到刚才转为小写的 IMAGE 变量
          tags: |
            type=raw,value=sha-${{ steps.sha.outputs.short }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build font
        env:
          IMAGE_REF: ${{ env.IMAGE }}:sha-${{ steps.sha.outputs.short }}
        run: ./build.sh

      - name: Create or update latest pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mv _output/${FONT_NAME}-*.zip "_output/${FONT_NAME}-latest.zip"

          gh release create latest \
            "_output/${FONT_NAME}-latest.zip" \
            -R "${{ github.repository }}" \
            --prerelease \
            --title "Latest build" \
